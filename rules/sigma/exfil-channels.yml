title: Exfiltration channel string hunt (Tier 3 companion to disk_scan_exfil)
status: experimental
description: >
  Sigma-style metadata mirroring postmortem_mcp.exfil_parse channel hints.
  The agent runs disk_scan_exfil against evidence text; these themes align
  with NIST NDLC email/cloud/optical exfil ground truth (R27–R29).
logsource:
  product: windows
  category: file_event
detection:
  email_channel:
    keywords:
      - gmail
      - webmail
      - smtp.
      - attachment
      - sent mail
  cloud_channel:
    keywords:
      - dropbox
      - google drive
      - naver
      - onedrive
      - cloud storage
  optical_channel:
    keywords:
      - cd-r
      - imgburn
      - disc burn
      - iso9660
falsepositives:
  - benign software installers mentioning cloud sync
  - OS optical-burn utilities on workstations with legitimate backup workflows
